<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TravelCal</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #0f172a;
  color: #e2e8f0;
  min-height: 100vh;
  padding: 16px;
  padding-bottom: 80px;
}
h1 { font-size: 1.4rem; text-align: center; padding: 12px 0; color: #7dd3fc; }
.trip-card {
  background: #1e293b;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 14px;
  border-left: 4px solid #38bdf8;
}
.trip-card.active { border-left-color: #22c55e; }
.trip-card.past { border-left-color: #475569; opacity: 0.6; }
.trip-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 8px;
}
.trip-dest { font-size: 1.15rem; font-weight: 600; color: #f1f5f9; }
.trip-dates { font-size: 0.82rem; color: #94a3b8; margin-bottom: 4px; }
.trip-countdown {
  font-size: 0.85rem;
  color: #38bdf8;
  font-weight: 500;
  margin-bottom: 10px;
}
.trip-countdown.ongoing { color: #22c55e; }
.trip-countdown.past { color: #64748b; }
.trip-info-row {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 8px;
}
.info-chip {
  background: #0f172a;
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 0.85rem;
  display: flex;
  align-items: center;
  gap: 6px;
}
.forecast-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
  gap: 6px;
  margin-top: 10px;
}
.forecast-day {
  background: #0f172a;
  border-radius: 8px;
  padding: 8px 4px;
  text-align: center;
  font-size: 0.75rem;
}
.forecast-day .day-name { color: #94a3b8; margin-bottom: 2px; }
.forecast-day .wx-icon { font-size: 1.3rem; }
.forecast-day .temps { color: #cbd5e1; margin-top: 2px; }
.forecast-day .temps .hi { color: #fb923c; }
.forecast-day .temps .lo { color: #7dd3fc; }
.delete-btn {
  background: none;
  border: none;
  color: #64748b;
  font-size: 1.2rem;
  cursor: pointer;
  padding: 4px 8px;
  line-height: 1;
}
.delete-btn:hover { color: #ef4444; }
.add-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: #38bdf8;
  color: #0f172a;
  border: none;
  font-size: 2rem;
  font-weight: 300;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(56,189,248,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
}
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: #1e293b;
  border-radius: 16px;
  padding: 24px;
  width: 100%;
  max-width: 400px;
}
.modal h2 { font-size: 1.1rem; margin-bottom: 16px; color: #7dd3fc; }
.form-group { margin-bottom: 14px; }
.form-group label {
  display: block;
  font-size: 0.82rem;
  color: #94a3b8;
  margin-bottom: 4px;
}
.form-group input {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid #334155;
  border-radius: 8px;
  background: #0f172a;
  color: #e2e8f0;
  font-size: 1rem;
}
.form-group input:focus { outline: none; border-color: #38bdf8; }
.geo-results {
  list-style: none;
  background: #0f172a;
  border-radius: 8px;
  margin-top: 4px;
  max-height: 160px;
  overflow-y: auto;
}
.geo-results li {
  padding: 10px 12px;
  cursor: pointer;
  font-size: 0.9rem;
  border-bottom: 1px solid #1e293b;
}
.geo-results li:hover, .geo-results li:focus { background: #1e293b; }
.modal-actions {
  display: flex;
  gap: 10px;
  margin-top: 18px;
}
.modal-actions button {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
  font-size: 0.95rem;
  cursor: pointer;
}
.btn-cancel { background: #334155; color: #e2e8f0; }
.btn-save { background: #38bdf8; color: #0f172a; font-weight: 600; }
.btn-save:disabled { opacity: 0.4; }
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: #64748b;
}
.empty-state .big { font-size: 3rem; margin-bottom: 12px; }
.section-label {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #64748b;
  margin: 18px 0 8px;
}
</style>
</head>
<body>

<h1>TravelCal</h1>
<div id="app"></div>
<button class="add-btn" onclick="openModal()" aria-label="Add trip">+</button>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>Add Trip</h2>
    <div class="form-group">
      <label for="dest-input">Destination</label>
      <input type="text" id="dest-input" placeholder="City name..." autocomplete="off">
      <ul class="geo-results" id="geo-results"></ul>
    </div>
    <div class="form-group">
      <label for="date-start">Depart</label>
      <input type="date" id="date-start">
    </div>
    <div class="form-group">
      <label for="date-end">Return</label>
      <input type="date" id="date-end">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" id="btn-save" disabled onclick="saveTrip()">Save</button>
    </div>
  </div>
</div>

<script>
const STORE_KEY = 'travelcal_trips';
let trips = JSON.parse(localStorage.getItem(STORE_KEY) || '[]');
let selectedGeo = null;
let searchTimeout = null;

// --- Persistence ---
function save() {
  localStorage.setItem(STORE_KEY, JSON.stringify(trips));
}

// --- Geocoding via Open-Meteo (no API key needed) ---
async function geocode(query) {
  if (!query || query.length < 2) return [];
  const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=5&language=en`;
  try {
    const r = await fetch(url);
    const data = await r.json();
    return data.results || [];
  } catch { return []; }
}

// --- Weather via Open-Meteo (no API key needed) ---
async function fetchWeather(lat, lon, timezone) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
    `&daily=weather_code,temperature_2m_max,temperature_2m_min` +
    `&current=temperature_2m,weather_code` +
    `&timezone=${encodeURIComponent(timezone)}&forecast_days=16`;
  try {
    const r = await fetch(url);
    return await r.json();
  } catch { return null; }
}

// --- WMO weather code to emoji ---
function wxEmoji(code) {
  if (code <= 1) return '\u2600\uFE0F';
  if (code <= 3) return '\u26C5';
  if (code <= 48) return '\uD83C\uDF2B\uFE0F';
  if (code <= 57) return '\uD83C\uDF26\uFE0F';
  if (code <= 67) return '\uD83C\uDF27\uFE0F';
  if (code <= 77) return '\u2744\uFE0F';
  if (code <= 82) return '\uD83C\uDF27\uFE0F';
  if (code <= 86) return '\uD83C\uDF28\uFE0F';
  return '\u26C8\uFE0F';
}

function wxLabel(code) {
  if (code <= 1) return 'Clear';
  if (code <= 3) return 'Cloudy';
  if (code <= 48) return 'Fog';
  if (code <= 57) return 'Drizzle';
  if (code <= 67) return 'Rain';
  if (code <= 77) return 'Snow';
  if (code <= 82) return 'Showers';
  if (code <= 86) return 'Snow showers';
  return 'Thunderstorm';
}

// --- Time formatting ---
function formatTime(timezone) {
  try {
    return new Date().toLocaleTimeString('en-US', {
      timeZone: timezone, hour: 'numeric', minute: '2-digit', hour12: true
    });
  } catch { return '?'; }
}

function formatDateShort(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function dayName(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'short' });
}

// --- Countdown ---
function daysUntil(dateStr) {
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const target = new Date(dateStr + 'T00:00:00');
  return Math.round((target - today) / 86400000);
}

function tripStatus(trip) {
  const daysToStart = daysUntil(trip.startDate);
  const daysToEnd = daysUntil(trip.endDate);
  if (daysToEnd < 0) return { label: 'Completed', cls: 'past' };
  if (daysToStart <= 0) return { label: 'Ongoing', cls: 'ongoing' };
  if (daysToStart === 1) return { label: 'Tomorrow!', cls: '' };
  return { label: `${daysToStart} days away`, cls: '' };
}

function shouldShowWeather(trip) {
  const daysToStart = daysUntil(trip.startDate);
  const daysToEnd = daysUntil(trip.endDate);
  return daysToEnd >= 0 && daysToStart <= 10;
}

// --- Rendering ---
async function render() {
  const app = document.getElementById('app');

  if (trips.length === 0) {
    app.innerHTML = '<div class="empty-state"><div class="big">\u2708\uFE0F</div>No trips yet.<br>Tap + to add one.</div>';
    return;
  }

  // Sort: ongoing first, then by start date ascending, past trips last
  const sorted = [...trips].sort((a, b) => {
    const sa = tripStatus(a), sb = tripStatus(b);
    if (sa.cls === 'past' && sb.cls !== 'past') return 1;
    if (sa.cls !== 'past' && sb.cls === 'past') return -1;
    return new Date(a.startDate) - new Date(b.startDate);
  });

  // Categorize
  const active = sorted.filter(t => { const s = tripStatus(t); return s.cls === 'ongoing'; });
  const upcoming = sorted.filter(t => { const s = tripStatus(t); return s.cls !== 'ongoing' && s.cls !== 'past'; });
  const past = sorted.filter(t => tripStatus(t).cls === 'past');

  let html = '';

  if (active.length) {
    html += '<div class="section-label">Now</div>';
    active.forEach(t => html += tripCardHTML(t));
  }
  if (upcoming.length) {
    html += '<div class="section-label">Upcoming</div>';
    upcoming.forEach(t => html += tripCardHTML(t));
  }
  if (past.length) {
    html += '<div class="section-label">Past</div>';
    past.forEach(t => html += tripCardHTML(t));
  }

  app.innerHTML = html;

  // Fetch weather for trips within 10-day window
  const weatherTrips = trips.filter(shouldShowWeather);
  for (const trip of weatherTrips) {
    const wx = await fetchWeather(trip.lat, trip.lon, trip.timezone);
    if (wx) renderWeather(trip.id, wx, trip);
  }
}

function tripCardHTML(trip) {
  const status = tripStatus(trip);
  const showWx = shouldShowWeather(trip);
  return `
    <div class="trip-card ${status.cls}" id="trip-${trip.id}">
      <div class="trip-header">
        <div>
          <div class="trip-dest">${esc(trip.name)}</div>
          <div class="trip-dates">${formatDateShort(trip.startDate)} \u2013 ${formatDateShort(trip.endDate)}</div>
          <div class="trip-countdown ${status.cls}">${status.label}</div>
        </div>
        <button class="delete-btn" onclick="deleteTrip('${trip.id}')" aria-label="Delete">\u00D7</button>
      </div>
      <div class="trip-info-row">
        <div class="info-chip">\uD83D\uDD52 ${formatTime(trip.timezone)}</div>
        <div class="info-chip">\uD83C\uDF0D ${trip.country || ''}</div>
      </div>
      ${showWx ? `<div id="wx-${trip.id}"><div class="info-chip" style="color:#64748b">Loading forecast\u2026</div></div>` : ''}
    </div>`;
}

function renderWeather(tripId, wx, trip) {
  const el = document.getElementById(`wx-${tripId}`);
  if (!el) return;

  const current = wx.current;
  let html = '';
  if (current) {
    html += `<div class="info-chip" style="font-size:0.95rem">
      ${wxEmoji(current.weather_code)} ${Math.round(current.temperature_2m)}\u00B0C now \u2014 ${wxLabel(current.weather_code)}
    </div>`;
  }

  if (wx.daily) {
    // Show forecast days that overlap with the trip, plus a few days before
    const tripStart = new Date(trip.startDate + 'T00:00:00');
    const tripEnd = new Date(trip.endDate + 'T00:00:00');
    const today = new Date();
    today.setHours(0, 0, 0, 0);

    html += '<div class="forecast-grid">';
    for (let i = 0; i < wx.daily.time.length; i++) {
      const d = new Date(wx.daily.time[i] + 'T00:00:00');
      // Show from today up to trip end (or all available if trip is ongoing)
      if (d < today) continue;
      html += `<div class="forecast-day">
        <div class="day-name">${dayName(wx.daily.time[i])}</div>
        <div class="wx-icon">${wxEmoji(wx.daily.weather_code[i])}</div>
        <div class="temps"><span class="hi">${Math.round(wx.daily.temperature_2m_max[i])}\u00B0</span> <span class="lo">${Math.round(wx.daily.temperature_2m_min[i])}\u00B0</span></div>
      </div>`;
    }
    html += '</div>';
  }

  el.innerHTML = html;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// --- CRUD ---
function deleteTrip(id) {
  if (!confirm('Delete this trip?')) return;
  trips = trips.filter(t => t.id !== id);
  save();
  render();
}

function openModal() {
  selectedGeo = null;
  document.getElementById('dest-input').value = '';
  document.getElementById('date-start').value = '';
  document.getElementById('date-end').value = '';
  document.getElementById('geo-results').innerHTML = '';
  document.getElementById('btn-save').disabled = true;
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('dest-input').focus(), 100);
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function saveTrip() {
  const startDate = document.getElementById('date-start').value;
  const endDate = document.getElementById('date-end').value;
  if (!selectedGeo || !startDate || !endDate) return;

  trips.push({
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
    name: selectedGeo.name,
    country: selectedGeo.country || '',
    lat: selectedGeo.latitude,
    lon: selectedGeo.longitude,
    timezone: selectedGeo.timezone || 'UTC',
    startDate,
    endDate
  });
  save();
  closeModal();
  render();
}

function updateSaveBtn() {
  const s = document.getElementById('date-start').value;
  const e = document.getElementById('date-end').value;
  document.getElementById('btn-save').disabled = !(selectedGeo && s && e);
}

// --- Event listeners ---
document.getElementById('dest-input').addEventListener('input', (e) => {
  clearTimeout(searchTimeout);
  selectedGeo = null;
  updateSaveBtn();
  searchTimeout = setTimeout(async () => {
    const results = await geocode(e.target.value.trim());
    const ul = document.getElementById('geo-results');
    if (!results.length) { ul.innerHTML = ''; return; }
    ul.innerHTML = results.map((r, i) =>
      `<li tabindex="0" data-idx="${i}">${esc(r.name)}, ${esc(r.admin1 || '')} ${esc(r.country || '')}</li>`
    ).join('');
    ul.querySelectorAll('li').forEach((li, i) => {
      li.addEventListener('click', () => pickGeo(results[i]));
      li.addEventListener('keydown', (ev) => { if (ev.key === 'Enter') pickGeo(results[i]); });
    });
  }, 300);
});

function pickGeo(geo) {
  selectedGeo = geo;
  document.getElementById('dest-input').value = `${geo.name}, ${geo.country || ''}`;
  document.getElementById('geo-results').innerHTML = '';
  updateSaveBtn();
}

document.getElementById('date-start').addEventListener('change', (e) => {
  const end = document.getElementById('date-end');
  if (!end.value || end.value < e.target.value) end.value = e.target.value;
  updateSaveBtn();
});
document.getElementById('date-end').addEventListener('change', updateSaveBtn);

// Close modal on overlay click
document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeModal();
});

// --- Auto-refresh clock every minute ---
setInterval(() => {
  document.querySelectorAll('.info-chip').forEach(chip => {
    if (chip.textContent.includes('\uD83D\uDD52')) {
      // Re-render all to update clocks
      render();
    }
  });
}, 60000);

// --- Init ---
render();
</script>
</body>
</html>
